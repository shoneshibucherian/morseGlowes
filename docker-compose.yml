version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db # Persistent data storage
    networks:
      - mongo-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Pre-installs the Infinity data source plugin
      GF_PLUGINS_PREINSTALL_SYNC: yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana # Persistent Grafana data
    networks:
      - mongo-network

volumes:
  mongo_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mongo-network:
    driver: bridge